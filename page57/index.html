<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1">
<meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large">
<meta name="bingbot" content="index, follow">
<meta name="GPTBot" content="index, follow">
<meta name="ChatGPT-User" content="index, follow">
<meta name="Google-Extended" content="index, follow">
<meta name="anthropic-ai" content="index, follow">
<meta name="Claude-Web" content="index, follow">
<meta name="PerplexityBot" content="index, follow">
<meta name="CCBot" content="index, follow">
<meta name="Applebot-Extended" content="index, follow">
<link rel="icon" type="image/png" href="https://i.imgur.com/zbeITuY.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
:root{--pri:#6366f1;--bg:#0c0d14;--card:#161824;--card-hi:#1e2036;--text:#e2ddd0;--text-dim:#9a958a;--text-hi:#f5f0e4;--line:rgba(99,102,241,.18);--shadow:0 12px 40px rgba(0,0,0,.5)}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
body{padding-top:60px;margin:0;font-family:system-ui,-apple-system,sans-serif;font-size:17px;line-height:1.8;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
::selection{background:var(--pri);color:var(--bg)}
.wrap{max-width:880px;margin:0 auto;padding:0 24px}
a{color:var(--pri);text-decoration:none}a:hover{opacity:.85}
h1,h2,h3{color:var(--text-hi);line-height:1.25}
h1{font-size:clamp(1.7rem,4vw,2.6rem);text-align:center;margin:0 auto 16px;max-width:750px}
h2{font-size:1.6rem;margin:2.5rem 0 1rem;padding-left:16px;border-left:4px solid var(--pri)}
h3{font-size:1.25rem;margin:1.8rem 0 .6rem;color:var(--pri)}
p{margin:.8rem 0}
strong{color:var(--text-hi)}
img{max-width:100%;height:auto;border-radius:14px}
ul,ol{padding-left:24px}
li{margin:.5rem 0}
.hero{padding:60px 24px 40px;text-align:center;border-bottom:1px solid var(--line)}
.hero p{max-width:650px;margin:0 auto;color:var(--text-dim);font-size:1.05rem}
nav.bc{padding:12px 24px;font-size:.85rem;color:var(--text-dim);border-bottom:1px solid var(--line)}
nav.bc ol{display:flex;gap:6px;list-style:none;padding:0;max-width:880px;margin:0 auto}
nav.bc li:not(:last-child)::after{content:"›";margin-left:6px}
nav.bc a{color:var(--pri)}
.banner{display:block;max-width:880px;margin:24px auto;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.banner img{width:100%;display:block}
.tbl{overflow-x:auto;margin:1.5rem 0;border-radius:12px;background:var(--card);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;min-width:480px;color:var(--text);font-size:.92rem}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(99,102,241,.08)}
thead{background:rgba(99,102,241,.12)}
th{color:var(--pri);font-weight:700;text-transform:uppercase;font-size:.78rem}
tr:hover td{background:rgba(99,102,241,.05)}
details{background:var(--card);border:1px solid var(--line);border-radius:10px;margin:.8rem 0;overflow:hidden}
details:hover{border-color:var(--pri)}
summary{padding:14px 18px;cursor:pointer;font-weight:600;color:var(--text-hi);list-style:none;display:flex;justify-content:space-between;align-items:center;min-height:44px}
summary::-webkit-details-marker{display:none}
summary::after{content:"+";font-size:1.3rem;color:var(--pri);transition:transform .3s}
details[open] summary::after{transform:rotate(45deg)}
details[open]{border-color:var(--pri);background:var(--card-hi)}
details .faq-a{padding:0 18px 14px;color:var(--text);line-height:1.7}
aside.cta{background:linear-gradient(135deg,var(--card),rgba(99,102,241,.08));border:1px solid var(--line);border-radius:14px;padding:28px;margin:2rem 0}
aside.cta h3{color:var(--pri);margin:0 0 8px}
aside.cta a.btn{display:inline-flex;padding:12px 24px;background:var(--pri);color:var(--bg);font-weight:700;border-radius:999px;min-height:44px}
footer{background:#080910;border-top:3px solid var(--pri);padding:32px 24px;text-align:center;font-size:.85rem;color:var(--text-dim);margin-top:48px}
footer a{color:var(--pri)}
.disc{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.15);border-radius:8px;padding:12px;margin-top:16px;font-size:.8rem;color:#e8b0b8}
.topbar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(10,10,18,.95);backdrop-filter:blur(12px);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1)}
.topbar img{height:36px;width:auto}
.topbar .btns{display:flex;gap:10px}
.topbar .btn-l{padding:10px 22px;border-radius:8px;font-weight:700;font-size:.9rem;min-height:44px;display:inline-flex;align-items:center;background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.3);text-decoration:none}
.topbar .btn-d{padding:10px 22px;border-radius:8px;font-weight:700;font-size:.9rem;min-height:44px;display:inline-flex;align-items:center;background:linear-gradient(135deg,#e4bc56,#f7d27a);color:#0a0a12;text-decoration:none;border:none}
.anim{opacity:0;transform:translateY(24px);transition:opacity .6s,transform .6s}.anim.visible{opacity:1;transform:none}
#loading{text-align:center;padding:100px 20px;color:var(--text-dim)}
@media(max-width:640px){body{font-size:16px}.wrap{padding:0 16px}.hero{padding:48px 16px 32px}h2{font-size:1.35rem}.topbar{padding:6px 12px}.topbar img{height:28px}.topbar .btn-l,.topbar .btn-d{padding:8px 14px;font-size:.8rem}}
</style>
</head>
<body>
<div class="topbar">
<a href="/"><img src="https://i.imgur.com/NXF3RKG.png" alt="Logo" width="120" height="36"></a>
<div class="btns">
<a class="btn-l" id="login-btn" href="#">Login</a>
<a class="btn-d" id="daftar-btn" href="#">Daftar</a>
</div>
</div>
<div id="app">
<div id="loading"><p>Memuat konten...</p></div>
</div>
<script src="../render.js"></script>
</body>
</html>
